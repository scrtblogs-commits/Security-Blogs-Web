<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="ring" cx="38%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#d0dde8"/>
      <stop offset="30%" stop-color="#8aa8c0"/>
      <stop offset="70%" stop-color="#4a6e8a"/>
      <stop offset="100%" stop-color="#1e3a50"/>
    </radialGradient>
    <radialGradient id="globe" cx="35%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#1e5080"/>
      <stop offset="45%" stop-color="#0d2d50"/>
      <stop offset="100%" stop-color="#04101e"/>
    </radialGradient>
    <radialGradient id="highlight" cx="30%" cy="20%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <clipPath id="globeClip">
      <circle cx="32" cy="32" r="25"/>
    </clipPath>
  </defs>

  <!-- Outer metallic ring -->
  <circle cx="32" cy="32" r="31.5" fill="url(#ring)"/>
  <!-- Ring inner shadow -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="1.5"/>

  <!-- Globe background -->
  <circle cx="32" cy="32" r="25" fill="url(#globe)"/>

  <!-- Grid lines clipped to globe -->
  <g clip-path="url(#globeClip)" opacity="0.35">
    <!-- Latitude lines -->
    <line x1="7" y1="32" x2="57" y2="32" stroke="#6aabde" stroke-width="0.8"/>
    <line x1="9" y1="22" x2="55" y2="22" stroke="#6aabde" stroke-width="0.6"/>
    <line x1="9" y1="42" x2="55" y2="42" stroke="#6aabde" stroke-width="0.6"/>
    <line x1="16" y1="14" x2="48" y2="14" stroke="#6aabde" stroke-width="0.5"/>
    <line x1="16" y1="50" x2="48" y2="50" stroke="#6aabde" stroke-width="0.5"/>
    <!-- Longitude ellipses -->
    <ellipse cx="32" cy="32" rx="10" ry="25" fill="none" stroke="#6aabde" stroke-width="0.7"/>
    <ellipse cx="32" cy="32" rx="18" ry="25" fill="none" stroke="#6aabde" stroke-width="0.7"/>
    <ellipse cx="32" cy="32" rx="25" ry="25" fill="none" stroke="#6aabde" stroke-width="0.7"/>
  </g>

  <!-- Kangaroo silhouette (facing left, centered) -->
  <g fill="rgba(180,220,255,0.82)" clip-path="url(#globeClip)">
    <!-- Body -->
    <ellipse cx="30" cy="36" rx="7" ry="5.5" transform="rotate(-15 30 36)"/>
    <!-- Chest/neck -->
    <ellipse cx="26" cy="30" rx="4" ry="5" transform="rotate(10 26 30)"/>
    <!-- Head -->
    <ellipse cx="23" cy="24" rx="3.2" ry="3.8" transform="rotate(-5 23 24)"/>
    <!-- Snout -->
    <ellipse cx="20.5" cy="23" rx="2.2" ry="1.5" transform="rotate(-10 20.5 23)"/>
    <!-- Ear -->
    <ellipse cx="22" cy="20.5" rx="1.2" ry="2.2" transform="rotate(10 22 20.5)"/>
    <ellipse cx="24.5" cy="20" rx="1" ry="2" transform="rotate(5 24.5 20)"/>
    <!-- Tail -->
    <path d="M37,38 Q44,42 42,48 Q40,50 39,47 Q40,44 35,41 Z"/>
    <!-- Back leg (large) -->
    <path d="M34,40 Q36,46 33,50 Q31,52 30,50 Q32,47 31,43 Z"/>
    <!-- Front arm -->
    <path d="M27,32 Q23,34 22,37 Q23,38 24,37 Q25,35 28,34 Z"/>
    <!-- Pouch area -->
    <ellipse cx="30" cy="37" rx="3" ry="2.5" fill="rgba(120,180,240,0.5)"/>
  </g>

  <!-- Globe highlight (glass effect) -->
  <circle cx="32" cy="32" r="25" fill="url(#highlight)"/>

  <!-- Inner rim glow -->
  <circle cx="32" cy="32" r="25" fill="none" stroke="rgba(160,210,255,0.45)" stroke-width="1.2"/>
  <!-- Outer ring shine -->
  <circle cx="32" cy="32" r="31.5" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
</svg>
